<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextUtils</title>
</head>

<body>
    <h1>Welcome to the text Analyzer. Enter your text below</h1>

    <form action="/analyze/" method="get">
        <textarea name="Info" id="inputInfo" style="width: 1896px; height: 156px; font-size: 30px;"></textarea>

        <input type="checkbox" name="remove">Remove Punctuations <br>
        <input type="checkbox" name="fullCaps">Full Capitalization <br>
        <input type="checkbox" name="lineRemover">New Line Remover <br>
        <input type="checkbox" name="spaceRemover">Extra Space Remover <br>
        <input type="checkbox" name="charCount">Character Counter <br>
        <button type="submit">Analyze Text</button>
    </form>
</body>

</html>
